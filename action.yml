name: build-docker-image-action
description: Action used to build and publish docker images to github registry
author: Julian Rodriguez (junirodriguezz1@gmail.com)
branding:
  icon: 'star'
  color: 'green'

inputs:
  dockerfile-path:
    description: 'The path of the dockerfile (from the root of the repository)'
    default: 'Dockerfile'
  target:
    description: 'The target to build from the docker file (useful for multi-stage dockerfiles)'
    default: ''
    required: false
  name-suffix:
    description: 'A suffix to add to the image name (useful for monorepos where you want to build multiple images from the same repo)'
    default: ''
    required: false
  context:
    description: 'The build context to use (from the root of the repository)'
    default: '.'
    required: false
  cache:
    description: 'Enable registry-based layer caching. Cached layers are stored as a separate tag in GHCR and reused across runs.'
    default: 'true'
    required: false
  submodules:
    description: 'Initialize recursively the submodules of the repository during cloning.'
    default: 'false'
  token:
    description: 'Token to clone the repository.'
    default: ${{ github.token }}
    required: false
  image-tag:
    description: 'Optional explicit image tag. Useful when the desired tag should not come from GITHUB_SHA.'
    default: ''
    required: false

outputs:
  image-name:
    description: 'The name of the built image, including registry and tag.'
    value: ${{ steps.build-image-name.outputs.output-image }}
  image-tags:
    description: 'The list of image tags that were built and pushed.'
    value: ${{ steps.build-image-name.outputs.output-images }}

runs:
  using: "composite"

  steps:
    - name: "⬇️ Checkout code"
      uses: actions/checkout@v4
      with:
        submodules: ${{ inputs.submodules }}
        token: ${{ inputs.token }}

    - name: "😎 Log in to Github Container Registry"
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: "💭 Determine docker image tag"
      id: build-image-name
      shell: bash
      run: |
        echo "Github ref: ${GITHUB_REF}"
        echo "Github ref name: ${GITHUB_REF_NAME}"

        image_name="${{ github.event.repository.name }}"
        image_suffix="${{ inputs.name-suffix }}"

        if [[ -n "${image_suffix}" ]]; then
          image_name="${image_name}/${image_suffix}"
        fi

        if [[ -n "${{ inputs.image-tag }}" ]]; then
          sha_tag="${{ inputs.image-tag }}"
          echo "Using explicit image tag input as primary tag..."
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          sha_tag="${GITHUB_REF#refs/tags/}"
          echo "We are in a TAG event, using tag as image tag..."
        else
          sha_tag="${GITHUB_SHA::7}"
        fi

        tags=()
        tags+=("ghcr.io/${{ github.repository_owner }}/${image_name}:${sha_tag}")

        if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
          branch_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##')"
          if [[ -n "${branch_tag}" ]]; then
            tags+=("ghcr.io/${{ github.repository_owner }}/${image_name}:${branch_tag}")
          fi

          if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
            tags+=("ghcr.io/${{ github.repository_owner }}/${image_name}:latest")
          fi
        fi

        echo "The image tags will be:"
        printf '  %s\n' "${tags[@]}"
        echo "IMAGE_TAG=${sha_tag}" >> $GITHUB_ENV

        OUTPUT_IMAGE="${tags[0]}"

        echo "Image will be: ${OUTPUT_IMAGE}"
        echo "output-image=${OUTPUT_IMAGE}" >> $GITHUB_OUTPUT
        {
          echo "output-images<<EOF"
          printf '%s\n' "${tags[@]}"
          echo "EOF"
        } >> $GITHUB_OUTPUT

        # Compute the cache ref: use a dedicated tag so it never collides with
        # real image tags.  When a target is specified (multi-stage build), include
        # it in the cache tag so different targets on the same Dockerfile keep
        # independent caches.
        if [[ -n "${{ inputs.target }}" ]]; then
          cache_tag="cache-${{ inputs.target }}"
        else
          cache_tag="cache"
        fi
        echo "cache-ref=ghcr.io/${{ github.repository_owner }}/${image_name}:${cache_tag}" >> $GITHUB_OUTPUT

    - name: "👷 Set up Docker Buildx"
      uses: docker/setup-buildx-action@v3

    - name: "Inspect inputs"
      shell: bash
      run: |
        echo "Dockerfile path: ${{ inputs.dockerfile-path }}"
        echo "Target: ${{ inputs.target }}"
        echo "Name suffix: ${{ inputs.name-suffix }}"
        echo "Context: ${{ inputs.context }}"

    - name: "🔨 & ⬆️ Build and push image"
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: ${{ steps.build-image-name.outputs.output-images }}
        file: ${{ inputs.dockerfile-path }}
        target: ${{ inputs.target }}
        context: ${{ inputs.context }}
        cache-from: ${{ inputs.cache == 'true' && format('type=registry,ref={0}', steps.build-image-name.outputs.cache-ref) || '' }}
        cache-to: ${{ inputs.cache == 'true' && format('type=registry,ref={0},mode=max', steps.build-image-name.outputs.cache-ref) || '' }}
